<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Para Menita 💕</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 30%, #e8d5e0 70%, #ede0ea 100%);
    }

    /* Partículas flotantes */
    .particle {
      position: fixed;
      pointer-events: none;
      animation: particleFloat linear infinite;
      z-index: 0;
      font-size: 1.1rem;
      opacity: 0;
    }

    @keyframes particleFloat {
      0%   { transform: translateY(110vh) rotate(0deg);   opacity: 0; }
      5%   { opacity: 0.6; }
      95%  { opacity: 0.4; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    /* Carta central */
    .envelope-wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      animation: fadeInUp 1s ease both;
    }

    .envelope {
      width: 160px;
      height: 120px;
      position: relative;
      margin-bottom: 32px;
      cursor: pointer;
      filter: drop-shadow(0 12px 32px rgba(107,58,88,0.25));
      transition: transform 0.4s ease;
    }

    .envelope:hover {
      transform: scale(1.05) translateY(-4px);
    }

    /* Envelope body */
    .env-body {
      width: 100%;
      height: 100%;
      background: linear-gradient(145deg, #f9e0eb, #f2c8d9);
      border-radius: 8px 8px 12px 12px;
      position: absolute;
      box-shadow: inset 0 -4px 8px rgba(0,0,0,0.05);
    }

    /* Flap superior */
    .env-flap {
      position: absolute;
      top: 0; left: 0;
      width: 0; height: 0;
      border-left: 80px solid transparent;
      border-right: 80px solid transparent;
      border-top: 58px solid #e8a0be;
      z-index: 2;
      border-radius: 4px;
      transform-origin: top center;
      transition: transform 0.6s ease;
    }

    .envelope:hover .env-flap {
      transform: rotateX(-140deg);
    }

    /* Triángulos laterales */
    .env-left {
      position: absolute;
      bottom: 0; left: 0;
      width: 0; height: 0;
      border-left: 80px solid #f0b8cf;
      border-top: 62px solid transparent;
      border-bottom: 62px solid transparent;
    }
    .env-right {
      position: absolute;
      bottom: 0; right: 0;
      width: 0; height: 0;
      border-right: 80px solid #f0b8cf;
      border-top: 62px solid transparent;
      border-bottom: 62px solid transparent;
    }
    .env-bottom {
      position: absolute;
      bottom: 0; left: 0;
      width: 0; height: 0;
      border-left: 80px solid transparent;
      border-right: 80px solid transparent;
      border-bottom: 62px solid #e8a0be;
      z-index: 1;
    }

    /* Corazón en la solapa */
    .env-seal {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -20%);
      font-size: 1.5rem;
      z-index: 3;
      animation: heartbeat 1.5s ease infinite;
    }

    .welcome-text h1 {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(2.4rem, 7vw, 4rem);
      color: var(--primary-dark);
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .welcome-text .subtitle {
      font-family: var(--font-body);
      font-size: 1rem;
      color: var(--text-light);
      font-weight: 300;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    .welcome-text .subtitle span {
      color: var(--primary);
    }

    .btn-enter {
      background: var(--gradient-primary);
      color: white;
      border: none;
      padding: 16px 48px;
      font-family: var(--font-body);
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 1px;
      border-radius: 50px;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 6px 28px rgba(107,58,88,0.35);
      transition: all 0.35s ease;
      display: inline-block;
      animation: float 3s ease infinite;
    }

    .btn-enter:hover {
      transform: translateY(-4px) scale(1.04);
      box-shadow: 0 12px 40px rgba(107,58,88,0.45);
    }

    .small-note {
      margin-top: 20px;
      font-size: 0.8rem;
      color: var(--text-light);
      opacity: 0.8;
      font-family: var(--font-script);
      font-size: 1rem;
    }
  </style>
</head>
<body>

  <div class="envelope-wrapper">
    <div class="envelope" onclick="goToMenu()">
      <div class="env-body"></div>
      <div class="env-left"></div>
      <div class="env-right"></div>
      <div class="env-bottom"></div>
      <div class="env-flap"></div>
      <div class="env-seal">💕</div>
    </div>

    <div class="welcome-text animate-fadeInUp delay-2">
      <h1>Hola, Menita</h1>
      <p class="subtitle">Algo especial · <span>solo para ti</span></p>
      <a href="menu.html" class="btn-enter">Abrir 🌸</a>
      <p class="small-note">Haz clic en el sobre o en el botón ↑</p>
    </div>
  </div>

  <script>
    // Generar partículas flotantes
    const symbols = ['🌸', '💕', '✨', '🌷', '💗', '🌺', '💫'];
    for (let i = 0; i < 18; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.textContent = symbols[Math.floor(Math.random() * symbols.length)];
      p.style.left = Math.random() * 100 + 'vw';
      p.style.animationDuration = (8 + Math.random() * 10) + 's';
      p.style.animationDelay = (Math.random() * 8) + 's';
      p.style.fontSize = (0.8 + Math.random() * 0.8) + 'rem';
      document.body.appendChild(p);
    }

    function goToMenu() {
      window.location.href = 'menu.html';
    }
  </script>
</body>
</html>
