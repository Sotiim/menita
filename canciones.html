<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Para Menita · Canciones</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Courier+Prime&display=swap" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      padding: 80px 20px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      text-align: center;
      padding: 0 0 48px;
      animation: fadeInUp 0.6s ease both;
    }

    header h1 {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(3rem, 8vw, 5rem);
      background: linear-gradient(135deg, var(--primary), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    header p.intro {
      font-size: 1rem;
      color: var(--text-light);
      max-width: 500px;
      margin: 0 auto;
      line-height: 1.6;
    }

    .gallery {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 48px;
      max-width: 1100px;
      width: 100%;
    }

    /* Polaroid */
    .polaroid {
      background: white;
      padding: 14px 14px 100px;
      width: 260px;
      box-shadow: 0 8px 24px rgba(107,58,88,0.15), 0 2px 6px rgba(0,0,0,0.08);
      transform: rotate(-2deg);
      transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
      position: relative;
      cursor: pointer;
      border-radius: 4px;
    }

    .polaroid:nth-child(even) { transform: rotate(1.5deg); }
    .polaroid:nth-child(3n)   { transform: rotate(-1deg); }

    .polaroid:hover {
      transform: rotate(0deg) scale(1.04) translateY(-8px);
      box-shadow: 0 20px 48px rgba(107,58,88,0.25);
      z-index: 10;
    }

    .photo-container {
      width: 100%;
      aspect-ratio: 1/1;
      overflow: hidden;
      position: relative;
      background: var(--secondary);
    }

    .photo-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .play-overlay {
      position: absolute;
      inset: 0;
      background: rgba(107,58,88,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .play-btn {
      background: white;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      color: var(--primary);
      text-decoration: none;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      transform: scale(0.8);
      transition: transform 0.3s;
    }

    .polaroid:hover .play-overlay { opacity: 1; }
    .polaroid:hover .play-btn { transform: scale(1); }

    .song-info {
      text-align: center;
      margin-top: 12px;
    }

    .song-title {
      font-family: 'Dancing Script', cursive;
      font-size: 1.6rem;
      color: var(--dark);
      margin: 0;
      line-height: 1.1;
    }

    .song-artist {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-light);
      margin: 4px 0 0;
    }

    .moment-stamp {
      position: absolute;
      bottom: 58px;
      left: 14px;
      right: 14px;
      font-family: 'Courier Prime', monospace;
      font-size: 0.7rem;
      color: var(--primary-light);
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px dotted var(--secondary);
      padding-bottom: 6px;
    }

    .handwritten-note {
      font-family: 'Dancing Script', cursive;
      color: var(--text);
      font-size: 1.1rem;
      line-height: 1.25;
      text-align: center;
      position: absolute;
      bottom: 10px;
      left: 10px;
      right: 10px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tape {
      position: absolute;
      top: -14px;
      left: 50%;
      transform: translateX(-50%);
      width: 90px;
      height: 26px;
      border-left: 2px dashed rgba(0,0,0,0.07);
      border-right: 2px dashed rgba(0,0,0,0.07);
      box-shadow: 0 2px 5px rgba(0,0,0,0.08);
      opacity: 0.85;
      z-index: 5;
    }
    .tape.pink { background: rgba(220,130,160,0.55); }
    .tape.blue { background: rgba(150,120,200,0.5); }

    @media (max-width: 600px) {
      .polaroid { width: 240px; transform: rotate(0deg) !important; margin-top: 16px; }
    }
  </style>
</head>
<body>

  <a href="menu.html" class="nav-back">← Menú</a>

  <header>
    <h1>Para Ti ✨</h1>
    <p class="intro">Pequeños fragmentos de canciones que traen tu recuerdo a mi mente.</p>
  </header>

  <div class="gallery" id="gallery"></div>

  <script>
    const songs = [
      {
        title: "Through the Dark",
        artist: "One Direction",
        link: "https://youtu.be/hD7vrP2yCqI?si=crIZkzixqJV-RcF1",
        moment: "Siempre",
        note: "Es fácil quererte...",
        color: "pink"
      },
      {
        title: "Invisible String",
        artist: "Taylor Swift",
        link: "https://youtu.be/OuFnpmGwg5k?si=gTC0pSIHiZS70Nmo",
        moment: "Desde diciembre la descubrí",
        note: "¿No es bonito pensar que siempre hubo un hilo atándonos?",
        color: "blue"
      },
      {
        title: "Melón Vino",
        artist: "Wos",
        link: "https://youtu.be/BZNtxpO9DoA?si=6fQNxCmJuPVct4om",
        moment: "El fin de semana pasado",
        note: "Quiero quedarme con vos...",
        color: "pink"
      },
      {
        title: "Te Quiero Tanto",
        artist: "Kevin Kaarl",
        link: "https://youtu.be/q07Gd6Q-7dY?si=kRmCEn7MxL7JDMzc",
        moment: "Viendo el atardecer",
        note: "Simplemente eso. Te quiero tanto.",
        color: "blue"
      },
      {
        title: "Perfect",
        artist: "One Direction",
        link: "https://youtu.be/Ho32Oh6b4jc?si=w6imGnFtzihmJe4r",
        moment: "Escuchando la radio",
        note: "Eres perfecta.",
        color: "pink"
      },
      {
        title: "Never Enough",
        artist: "One Direction",
        link: "https://youtu.be/FwjshZCtUS0?si=NNRfwcMJRc3Uluu8",
        moment: "Justo ahora",
        note: "Nunca es suficiente contigo.",
        color: "blue"
      }
    ];

    const gallery = document.getElementById('gallery');

    function getYouTubeID(url) {
      const m = url.match(/(?:youtu\.be\/|v=)([^#&?]{11})/);
      return m ? m[1] : null;
    }

    songs.forEach((song, i) => {
      const vid = getYouTubeID(song.link);
      const img = vid ? `https://img.youtube.com/vi/${vid}/hqdefault.jpg` : '';

      const card = document.createElement('div');
      card.className = 'polaroid animate-fadeInUp';
      card.style.animationDelay = (i * 0.15) + 's';

      card.innerHTML = `
        <div class="tape ${song.color}"></div>
        <div class="photo-container">
          <img src="${img}" alt="${song.title}">
          <div class="play-overlay">
            <a href="${song.link}" target="_blank" class="play-btn">▶</a>
          </div>
        </div>
        <div class="song-info">
          <p class="song-title">${song.title}</p>
          <p class="song-artist">${song.artist}</p>
        </div>
        <div class="moment-stamp">📅 ${song.moment}</div>
        <div class="handwritten-note">${song.note}</div>
      `;
      gallery.appendChild(card);
    });
  </script>

</body>
</html>
