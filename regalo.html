<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Para Menita · El regalo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      padding: 80px 20px 80px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .page-header {
      text-align: center;
      margin-bottom: 36px;
      animation: fadeInUp 0.6s ease both;
    }

    .page-header h1 {
      font-family: var(--font-script);
      font-size: clamp(2rem, 6vw, 3rem);
      color: var(--primary-dark);
      margin-bottom: 8px;
    }

    .page-header p {
      color: var(--text-light);
      font-size: 0.9rem;
    }

    .game-wrapper {
      width: 100%;
      max-width: 520px;
    }

    /* Progress bar */
    .progress-bar {
      background: var(--secondary);
      border-radius: 20px;
      height: 8px;
      margin-bottom: 28px;
      overflow: hidden;
      animation: fadeInUp 0.5s ease 0.2s both;
    }

    .progress-fill {
      height: 100%;
      background: var(--gradient-primary);
      border-radius: 20px;
      transition: width 0.5s ease;
      width: 12.5%;
    }

    .progress-label {
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-light);
      margin-bottom: 12px;
      letter-spacing: 1px;
    }

    /* Clue card */
    .clue-card {
      background: white;
      border-radius: 20px;
      padding: 36px 32px;
      box-shadow: var(--shadow);
      text-align: center;
      margin-bottom: 24px;
      animation: fadeInUp 0.5s ease both;
      border-top: 4px solid var(--accent);
      transition: border-color 0.4s ease;
    }

    .clue-number {
      display: inline-block;
      background: linear-gradient(135deg, var(--secondary), var(--accent));
      color: var(--primary-dark);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 2px;
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 16px;
    }

    .clue-icon {
      font-size: 3rem;
      margin-bottom: 16px;
      display: block;
      animation: float 3s ease infinite;
    }

    .clue-text {
      font-size: 1.05rem;
      line-height: 1.7;
      color: var(--text);
      margin-bottom: 0;
    }

    /* Final question */
    .final-section {
      text-align: center;
    }

    .final-section p {
      font-size: 1rem;
      color: var(--text-light);
      margin-bottom: 16px;
      font-style: italic;
    }

    .lyric-hint {
      font-family: var(--font-display);
      font-size: 1.2rem;
      color: var(--primary);
      margin: 20px 0;
      padding: 16px;
      background: linear-gradient(135deg, #fce4ec, #ede0ea);
      border-radius: 12px;
    }

    .answer-input {
      width: 100%;
      padding: 14px 20px;
      font-size: 1rem;
      font-family: var(--font-body);
      border: 2px solid var(--secondary);
      border-radius: 50px;
      outline: none;
      color: var(--text);
      margin-bottom: 16px;
      transition: border-color 0.3s ease;
      text-align: center;
    }

    .answer-input:focus {
      border-color: var(--primary);
    }

    .answer-input::placeholder {
      color: var(--text-light);
    }

    /* Reveal */
    .reveal-card {
      background: linear-gradient(135deg, #fce4ec, #ede0ea);
      border-radius: 20px;
      padding: 40px 32px;
      text-align: center;
      box-shadow: var(--shadow);
      animation: fadeInUp 0.6s ease both;
    }

    .reveal-card .big-emoji {
      font-size: 4rem;
      display: block;
      margin-bottom: 16px;
      animation: heartbeat 1.5s ease infinite;
    }

    .reveal-card h2 {
      font-family: var(--font-script);
      font-size: 2rem;
      color: var(--primary-dark);
      margin-bottom: 12px;
    }

    .reveal-card p {
      color: var(--text);
      font-size: 1rem;
      line-height: 1.6;
    }

    .reveal-card .gift-name {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--primary);
      margin: 16px 0;
    }
  </style>
</head>
<body>

  <a href="menu.html" class="nav-back">← Menú</a>

  <div class="page-header">
    <h1>Adivina el regalo 🎁</h1>
    <p>Sigue las pistas para descubrirlo</p>
  </div>

  <div class="game-wrapper">
    <p class="progress-label" id="progressLabel">Pista 1 de 8</p>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div id="gameArea"></div>
  </div>

  <script>
    const clues = [
      { icon: '🌟', text: 'Este regalo está relacionado con recuerdos y momentos especiales.' },
      { icon: '📦', text: 'Tiene algo que ver con colecciones, pero no es un objeto común.' },
      { icon: '🖼️', text: 'Si eres fan de las historias que se cuentan a través de imágenes, este regalo te encantará.' },
      { icon: '🎶', text: 'Este regalo está inspirado en alguien que ha marcado a muchas generaciones con su música.' },
      { icon: '🧩', text: 'Es algo que se disfruta al ver cómo se va completando, pieza por pieza.' },
      { icon: '✨', text: 'Este regalo tiene que ver con la evolución de una artista que ha sido icónica durante años.' },
      { icon: '📖', text: 'Se puede decir que este regalo refleja una historia en cada paso, desde el principio hasta el final.' },
      { icon: '💫', text: '¿Te gusta coleccionar recuerdos? Este regalo es una forma de juntar recuerdos a lo largo del tiempo.' },
    ];

    const correctAnswers = [
      "álbum de estampas de taylor swift",
      "álbum de estampas de todas las eras de taylor swift",
      "álbum de fotos de taylor swift",
      "álbum de estampas de las eras de taylor swift",
      "álbum de taylor swift",
      "album de estampas de taylor swift",
      "taylor swift",
      "estampas de taylor swift",
    ];

    let step = 0;

    function render() {
      const area = document.getElementById('gameArea');
      const progressFill = document.getElementById('progressFill');
      const progressLabel = document.getElementById('progressLabel');

      if (step < clues.length) {
        const clue = clues[step];
        const pct = ((step + 1) / (clues.length + 1)) * 100;
        progressFill.style.width = pct + '%';
        progressLabel.textContent = `Pista ${step + 1} de ${clues.length}`;

        const colors = ['#f9a8c9','#c8a0d8','#a0c8e8','#a0d8b8','#f9c8a0','#f9a8a8','#c8d8a0','#a8c8f9'];
        area.innerHTML = `
          <div class="clue-card" style="border-top-color:${colors[step]}">
            <span class="clue-number">PISTA ${step + 1}</span>
            <span class="clue-icon">${clue.icon}</span>
            <p class="clue-text">${clue.text}</p>
          </div>
          <div style="text-align:center">
            <button class="btn" onclick="nextClue()">Siguiente pista →</button>
          </div>
        `;
      } else {
        // Final question
        progressFill.style.width = '90%';
        progressLabel.textContent = 'Pregunta final';
        area.innerHTML = `
          <div class="clue-card">
            <span class="clue-number">ÚLTIMA PISTA</span>
            <span class="clue-icon">🎤</span>
            <p class="clue-text">Ya tienes todas las pistas. ¿Ya lo sabes?</p>
            <div class="lyric-hint">"I was enchanted to meet you..."</div>
            <div class="final-section">
              <p>Escribe tu respuesta:</p>
              <input type="text" class="answer-input" id="answerInput" placeholder="¿Qué crees que es?">
              <br>
              <button class="btn" onclick="checkAnswer()">¡Adivinar! 🎁</button>
            </div>
          </div>
        `;
      }
    }

    function nextClue() {
      step++;
      render();
    }

    function checkAnswer() {
      const input = document.getElementById('answerInput').value.toLowerCase().trim();
      const isCorrect = correctAnswers.some(a => input.includes(a));

      if (isCorrect) {
        showReveal();
      } else {
        // Shake the input
        const inp = document.getElementById('answerInput');
        inp.style.borderColor = '#e57373';
        inp.style.animation = 'shake 0.4s ease';
        setTimeout(() => {
          inp.style.borderColor = '';
          inp.style.animation = '';
        }, 500);

        // Add shake keyframe if not exists
        if (!document.getElementById('shakeStyle')) {
          const s = document.createElement('style');
          s.id = 'shakeStyle';
          s.textContent = `@keyframes shake {
            0%,100%{transform:translateX(0)}
            25%{transform:translateX(-8px)}
            75%{transform:translateX(8px)}
          }`;
          document.head.appendChild(s);
        }
      }
    }

    function showReveal() {
      document.getElementById('progressFill').style.width = '100%';
      document.getElementById('progressLabel').textContent = '¡Adivinaste! 🎉';
      document.getElementById('gameArea').innerHTML = `
        <div class="reveal-card">
          <span class="big-emoji">🎉</span>
          <h2>¡Lo adivinaste!</h2>
          <p class="gift-name">Álbum de estampas de Taylor Swift 💕</p>
          <p>Incluye todas las eras de Taylor Swift. Para que lo vayas completando poco a poco, como nuestra historia.</p>
        </div>
      `;
    }

    render();
  </script>
</body>
</html>
